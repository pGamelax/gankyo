<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA — iOS Safari -->
    <!-- Habilita modo standalone (tela cheia sem barra do Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Define o estilo da status bar (default = branca com texto escuro) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Gankyo" />
    <!-- Ícone para "Adicionar à tela de início" no iOS -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- PWA — Android / Chrome -->
    <meta name="theme-color" content="#2d6a4f" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Gankyo — Gerenciador de Relatórios</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
