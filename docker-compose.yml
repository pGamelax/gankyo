services:
  postgres:
    image: postgres:17-alpine
    container_name: gankyo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gankyo
      POSTGRES_PASSWORD: gankyo
      POSTGRES_DB: gankyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gankyo -d gankyo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
